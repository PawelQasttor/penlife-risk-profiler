steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:$COMMIT_SHA'
      - '-t'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:latest'
      - '.'

  # Push the Docker image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'penlife-risk-profiler'
      - '--image=europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=europe-west2'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--max-instances=10'
      - '--service-account=penlife-risk-profiler@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID'

images:
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:$COMMIT_SHA'
  - 'europe-west2-docker.pkg.dev/$PROJECT_ID/penlife-risk-profiler/app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
